<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f5f5f5;color:#222}
:root{
  --g:#1D9E75;--gl:#E1F5EE;--gd:#085041;
  --r:#E24B4A;--rl:#FCEBEB;--rd:#A32D2D;
  --b:#378ADD;--bl:#E6F1FB;
  --border:#e0e0e0;--bg:#fff;--bg2:#f7f7f7;
}
.wrap{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--border);background:#fff}
.topbar h1{font-size:18px;font-weight:600}
.tl{display:flex;align-items:center;gap:8px}
.dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:var(--g)}.dot.err{background:var(--r)}.dot.spin{background:#EF9F27;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.slbl{font-size:12px;color:#888}
.nav{display:flex;align-items:center;gap:8px}
.nav button{border:1px solid var(--border);background:#fff;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:16px;color:#555}
.nav button:hover{background:#f0f0f0}
.nav span{font-size:15px;font-weight:600;min-width:82px;text-align:center}
.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);background:#fff}
.sc{background:var(--bg2);border-radius:10px;padding:10px 12px}
.sc .sl{font-size:11px;color:#888;margin-bottom:3px}
.sc .sv{font-size:17px;font-weight:600}
.sv.i{color:var(--g)}.sv.e{color:var(--r)}.sv.b{color:var(--b)}
.cal{padding:12px 14px;background:#fff}
.dows{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
.dow{font-size:12px;font-weight:500;text-align:center;color:#888;padding:4px 0}
.dow:first-child{color:var(--r)}.dow:last-child{color:var(--b)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cell{border-radius:10px;padding:7px 4px;min-height:56px;background:var(--bg2);border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:border-color .15s}
.cell:hover{border-color:#ccc}
.cell:active{opacity:.7}
.cell.other{opacity:.2;pointer-events:none}
.cell.today{border-color:var(--b);background:var(--bl)}
.cell.sel{border-color:var(--g)}
.cn{font-size:13px;font-weight:500;color:#666;line-height:1}
.cn.sun{color:var(--r)}.cn.sat{color:var(--b)}.cn.tod{color:var(--b);font-weight:700}
.pip{width:7px;height:7px;border-radius:50%}
.pip.i{background:var(--g)}.pip.e{background:var(--r)}
.pips{display:flex;gap:3px;flex-wrap:wrap;justify-content:center}
.panel{border-top:1px solid var(--border);padding:14px 16px;background:#fff}
.ph{margin-bottom:12px}
.ph h3{font-size:15px;font-weight:600}
.form{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.formrow{display:flex;gap:8px;align-items:center}
.tt{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.tt button{padding:7px 14px;font-size:13px;border:none;background:none;cursor:pointer;color:#888;font-family:inherit}
.tt button.ai{background:var(--gl);color:var(--gd);font-weight:600}
.tt button.ae{background:var(--rl);color:var(--rd);font-weight:600}
select,input[type=number]{font-size:14px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:#222;flex:1;font-family:inherit}
.ab{padding:7px 18px;font-size:14px;border:none;border-radius:8px;background:var(--g);color:#fff;cursor:pointer;font-weight:600;white-space:nowrap;font-family:inherit}
.ab:disabled{opacity:.5}
.elist{display:flex;flex-direction:column;gap:5px}
.er{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border-radius:8px}
.ec{flex:1;font-size:13px;color:#888}
.ea{font-size:14px;font-weight:600;min-width:80px;text-align:right}
.ea.i{color:var(--g)}.ea.e{color:var(--r)}
.db{background:none;border:none;cursor:pointer;font-size:18px;color:#bbb;padding:0 4px;line-height:1}
.db:hover{color:var(--r)}
.em{font-size:13px;color:#aaa;text-align:center;padding:16px 0}
.foot{font-size:11px;color:#aaa;text-align:center;padding:12px 16px;border-top:1px solid var(--border);background:#fff}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="tl">
      <h1>家計簿</h1>
      <span class="dot spin" id="dot"></span>
      <span class="slbl" id="slbl">接続中...</span>
    </div>
    <div class="nav">
      <button id="prev">‹</button>
      <span id="mlbl"></span>
      <button id="next">›</button>
    </div>
  </div>
  <div class="sumrow">
    <div class="sc"><div class="sl">収入</div><div class="sv i" id="si">¥0</div></div>
    <div class="sc"><div class="sl">支出</div><div class="sv e" id="se">¥0</div></div>
    <div class="sc"><div class="sl">残高</div><div class="sv b" id="sb">¥0</div></div>
  </div>
  <div class="cal">
    <div class="dows">
      <div class="dow">日</div><div class="dow">月</div><div class="dow">火</div>
      <div class="dow">水</div><div class="dow">木</div><div class="dow">金</div><div class="dow">土</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="panel">
    <div class="ph"><h3 id="pdlbl">日付を選んでください</h3></div>
    <div class="form">
      <div class="formrow">
        <div class="tt">
          <button id="ib" class="ai" onclick="setType('inc')">収入</button>
          <button id="eb" onclick="setType('exp')">支出</button>
        </div>
        <select id="cs"></select>
      </div>
      <div class="formrow">
        <input type="number" id="ai" placeholder="金額を入力（例: 5000）" min="1">
        <button class="ab" id="ab" onclick="addE()">追加</button>
      </div>
    </div>
    <div class="elist" id="elist"></div>
  </div>
  <div class="foot">スマホ・PCでこのHTMLファイルを開くとデータが共有されます</div>
</div>
<script>
const SU='https://rpalacpkyloamikjmtri.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwYWxhY3BreWxvYW1pa2ptdHJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzE0MTAsImV4cCI6MjA5MjU0NzQxMH0.3rkBfZyR45vZIzUbUii2hjwQMKSulICzIzFOzSOKZjc';
const SH={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK};
const INC=['給与','副業','ボーナス','配当','その他収入'];
const EXP=['食費','外食','交通費','住居費','水道光熱費','通信費','医療費','娯楽','衣類','日用品','教育','保険','貯蓄','その他支出'];
let ct='inc',today=new Date(),vy=today.getFullYear(),vm=today.getMonth(),sel=null,data=[];
function fy(n){return '¥'+Math.abs(Math.round(n)).toLocaleString('ja-JP')}
function fk(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function ss(s,t){document.getElementById('dot').className='dot '+s;document.getElementById('slbl').textContent=t}
async function load(){
  ss('spin','読込中...');
  try{
    let p=vy+'-'+String(vm+1).padStart(2,'0')+'-';
    let r=await fetch(SU+'/rest/v1/entries?date=like.'+encodeURIComponent(p+'*')+'&order=created_at.asc',{headers:SH});
    if(!r.ok)throw new Error((await r.json()).message||r.status);
    data=await r.json();
    ss('ok','同期済み');
  }catch(e){ss('err','接続エラー: '+e.message)}
  render();
}
async function addE(){
  if(!sel){alert('カレンダーの日付を選んでください');return}
  let a=parseInt(document.getElementById('ai').value);
  if(!a||a<=0){alert('金額を入力してください');return}
  let c=document.getElementById('cs').value;
  let b=document.getElementById('ab');
  b.disabled=true;b.textContent='保存中';ss('spin','保存中...');
  try{
    let r=await fetch(SU+'/rest/v1/entries',{
      method:'POST',
      headers:{...SH,'Prefer':'return=representation'},
      body:JSON.stringify({date:sel,type:ct,category:c,amount:a})
    });
    if(!r.ok)throw new Error((await r.json()).message||r.status);
    let ne=await r.json();
    data.push(...ne);
    document.getElementById('ai').value='';
    ss('ok','保存しました');
  }catch(e){ss('err','保存失敗');alert('保存失敗: '+e.message)}
  b.disabled=false;b.textContent='追加';render();
}
async function delE(id){
  ss('spin','削除中...');
  try{
    let r=await fetch(SU+'/rest/v1/entries?id=eq.'+id,{method:'DELETE',headers:SH});
    if(!r.ok)throw new Error();
    data=data.filter(e=>e.id!==id);ss('ok','削除しました');
  }catch(e){ss('err','削除失敗')}
  render();
}
function setType(t){
  ct=t;
  document.getElementById('ib').className=t==='inc'?'ai':'';
  document.getElementById('eb').className=t==='exp'?'ae':'';
  document.getElementById('cs').innerHTML=(t==='inc'?INC:EXP).map(c=>'<option>'+c+'</option>').join('');
}
function clickDay(key,y,m,d){
  sel=key;
  document.getElementById('pdlbl').textContent=y+'年'+(m+1)+'月'+d+'日の記録';
  render();
}
function render(){
  let g=document.getElementById('grid');g.innerHTML='';
  document.getElementById('mlbl').textContent=vy+'年'+(vm+1)+'月';
  let first=new Date(vy,vm,1).getDay();
  let dim=new Date(vy,vm+1,0).getDate();
  let prev=new Date(vy,vm,0).getDate();
  let cells=[];
  for(let i=0;i<first;i++)cells.push({d:prev-first+1+i,cur:false});
  for(let d=1;d<=dim;d++)cells.push({d,cur:true});
  while(cells.length%7!==0)cells.push({d:cells.length-first-dim+1,cur:false});
  cells.forEach((c,i)=>{
    let dow=i%7,div=document.createElement('div');
    let cy=vy,cm=vm,cd=c.d;
    if(!c.cur){if(i<7){cm--;if(cm<0){cm=11;cy--;}}else{cm++;if(cm>11){cm=0;cy++;}}}
    let key=fk(cy,cm,cd);
    let isTod=cy===today.getFullYear()&&cm===today.getMonth()&&cd===today.getDate();
    div.className='cell'+(c.cur?'':' other')+(isTod?' today':'')+(key===sel?' sel':'');
    let dn=document.createElement('div');
    dn.className='cn'+(dow===0?' sun':dow===6?' sat':'')+(isTod?' tod':'');
    dn.textContent=cd;div.appendChild(dn);
    if(c.cur){
      let de=data.filter(e=>e.date===key);
      let hasI=de.some(e=>e.type==='inc'),hasE=de.some(e=>e.type==='exp');
      if(hasI||hasE){
        let pp=document.createElement('div');pp.className='pips';
        if(hasI){let p=document.createElement('div');p.className='pip i';pp.appendChild(p);}
        if(hasE){let p=document.createElement('div');p.className='pip e';pp.appendChild(p);}
        div.appendChild(pp);
      }
      let _k=key,_y=cy,_m=cm,_d=cd;
      div.onclick=function(){clickDay(_k,_y,_m,_d)};
    }
    g.appendChild(div);
  });
  let inc=0,exp=0;
  data.forEach(e=>{if(e.type==='inc')inc+=e.amount;else exp+=e.amount;});
  document.getElementById('si').textContent=fy(inc);
  document.getElementById('se').textContent=fy(exp);
  let bal=inc-exp;
  let sb=document.getElementById('sb');
  sb.textContent=(bal<0?'-':'')+fy(bal);sb.className='sv '+(bal>=0?'b':'e');
  let list=document.getElementById('elist');
  if(!sel){list.innerHTML='<div class="em">↑ カレンダーの日付をタップして選択</div>';return}
  let de=data.filter(e=>e.date===sel);
  if(!de.length){list.innerHTML='<div class="em">この日の記録はありません</div>';return}
  list.innerHTML=de.map(e=>'<div class="er"><span class="ec">'+e.category+'</span><span class="ea '+(e.type==='inc'?'i':'e')+'">'+(e.type==='inc'?'+':'-')+fy(e.amount)+'</span><button class="db" onclick="delE(\''+e.id+'\')">✕</button></div>').join('');
}
document.getElementById('prev').onclick=function(){vm--;if(vm<0){vm=11;vy--;}sel=null;document.getElementById('pdlbl').textContent='日付を選んでください';load()};
document.getElementById('next').onclick=function(){vm++;if(vm>11){vm=0;vy++;}sel=null;document.getElementById('pdlbl').textContent='日付を選んでください';load()};
setType('inc');load();
</script>
</body>
</html>
